version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: clef
    main: ./main.go
    binary: clef
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sapihav/clef-cli/cmd.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sapihav
    name: clef
  draft: false
  prerelease: auto

homebrew_casks:
  - name: clef
    binaries:
      - clef
    repository:
      owner: sapihav
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/sapihav/clef-cli
    description: Per-project Claude Code model and effort configuration
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    # Remove macOS quarantine bit so the unsigned binary runs without
    # Gatekeeper's "cannot be opened" warning. If we add notarization
    # later, this hook can be dropped.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clef"]
          end
